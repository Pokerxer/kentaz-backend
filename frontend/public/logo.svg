<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 36">
  <defs>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C9A84C"/>
      <stop offset="50%"  stop-color="#E8D48A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="goldD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#D4B05A"/>
      <stop offset="100%" stop-color="#B8953F"/>
    </linearGradient>
  </defs>

  <!-- K mark: gold rounded square -->
  <rect x="0" y="2" width="30" height="30" rx="6" fill="url(#goldD)"/>

  <!-- K letterform in dark -->
  <path d="M8 8 L8 26"     stroke="#1A1A1A" stroke-width="3"   stroke-linecap="round" fill="none"/>
  <path d="M8 17 L20 8"    stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M8 17 L20 26"   stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Wordmark: KENTAZ -->
  <text
    x="40" y="21"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="16"
    font-weight="800"
    letter-spacing="2.5"
    fill="url(#goldH)">KENTAZ</text>

  <!-- Wordmark: EMPORIUM -->
  <text
    x="40.5" y="32"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="6.5"
    font-weight="500"
    letter-spacing="4.5"
    fill="#C9A84C"
    opacity="0.78">EMPORIUM</text>
</svg>
